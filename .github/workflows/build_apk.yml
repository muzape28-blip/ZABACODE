name: Build Zabacode APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # biar bisa di-trigger manual dari tab Actions juga

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer & deps
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Build APK (debug)
        run: |
          yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zabacode-apk
          path: bin/*.apk

# ============================================================================
# JUJUR: workflow ini disusun dari pola resmi yang dipakai repo buildozer
# sendiri + beberapa contoh kivy/buildozer di GitHub, TAPI belum pernah
# dijalanin beneran buat proyek Zabacode ini spesifik. Build pertama kali
# biasanya makan ~15-20 menit dan ada kemungkinan perlu 1-2 kali iterasi
# nyesuain versi paket (ini normal buat proyek buildozer manapun, cek log
# error di tab Actions kalau gagal — biasanya jelas apa yang kurang).
# ============================================================================
