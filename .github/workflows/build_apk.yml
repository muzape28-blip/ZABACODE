name: Build Zabacode APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # biar bisa di-trigger manual dari tab Actions juga

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            openjdk-17-jdk-headless \
            autoconf \
            automake \
            libtool \
            libtoolize \
            pkg-config \
            m4 \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            libsqlite3-dev \
            libreadline-dev \
            xz-utils \
            liblzma-dev
          
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Increase build timeout and memory
        run: |
          sudo sysctl -w vm.max_map_count=262144
          
      - name: Build APK (debug)
        run: |
          # Increase JVM heap size untuk build process
          export _JAVA_OPTIONS="-Xmx4096m"
          yes | buildozer -v android debug
        timeout-minutes: 120

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: zabacode-apk
          path: bin/*.apk

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: .buildozer/

# ============================================================================
# Build configuration:
# - System deps: autotools lengkap (autoconf, automake, libtool) + m4 macros
# - Build tools: cython, pip upgrade, setuptools, wheel
# - JVM: increased heap size untuk Android build
# - Timeout: 120 menit buat handle libffi + Python compilation
# - Logs: auto-upload kalau build gagal, useful buat debugging
# ============================================================================
