name: Build ZABACODE APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Buildozer & Cython
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --user buildozer==1.6.0 cython==0.29.33
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # LANGSUNG BUILD + AUTO ACCEPT LICENSE
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Zabacode-ARMv7
        path: bin/*.apk
