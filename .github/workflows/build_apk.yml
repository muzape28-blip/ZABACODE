name: Build ZABACODE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip curl openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5 libncurses5-dev libncursesw5-dev libtinfo5 libffi-dev libssl-dev

    - name: Install Buildozer & Cython
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --user buildozer cython==0.29.33
      env:
        PATH: ${{ runner.home }}/.local/bin:${{ env.PATH }}

    - name: Set up Android SDK (cmdline-tools + build-tools + platform)
      env:
        ANDROID_SDK_ROOT: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        ANDROID_HOME: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        set -e
        SDK_ROOT="$ANDROID_SDK_ROOT"
        mkdir -p "$SDK_ROOT"
        cd /tmp
        # download command-line tools (version number may be updated in future)
        curl -fsSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q cmdline-tools.zip -d cmdline-tools-temp
        mkdir -p "$SDK_ROOT/cmdline-tools"
        # the cmdline-tools content is in cmdline-tools-temp/cmdline-tools
        mv cmdline-tools-temp/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"
        export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        # ensure platform-tools and chosen platform/build-tools are installed
        yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses
        sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        # make aidl available via build-tools path (ensure buildozer finds it)
        export PATH="$SDK_ROOT/platform-tools:$SDK_ROOT/build-tools/33.0.2:$PATH"
        echo "Android SDK installed under $SDK_ROOT"
      shell: bash

    - name: Build APK
      env:
        ANDROID_SDK_ROOT: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        ANDROID_HOME: ${{ runner.home }}/.buildozer/android/platform/android-sdk
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        PATH: ${{ runner.home }}/.local/bin:${{ runner.home }}/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:${{ runner.home }}/.buildozer/android/platform/android-sdk/platform-tools:${{ runner.home }}/.buildozer/android/platform/android-sdk/build-tools/33.0.2:$PATH
      run: |
        set -e
        # show versions for debugging
        java -version || true
        sdkmanager --version || true
        which aidl || echo "aidl not found in PATH"
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Zabacode-ARMv7
        path: bin/*.apk
